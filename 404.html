<!doctype html>

<!-- Absolute base so links work no matter how deep the missing URL was. -->
<base href="https://voidforgesystems.com/" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:grid;place-items:center;background:#05060a;color:#eaf6ff;
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;text-align:center;padding:24px;
    background-image:radial-gradient(circle at 50% 30%,rgba(0,212,255,0.10),transparent 60%)}
  .wrap{max-width:520px}
  .ring{width:84px;height:84px;border-radius:50%;border:5px solid #00d4ff;margin:0 auto 28px;position:relative}
  .ring::after{content:"";position:absolute;inset:26px;border-radius:50%;background:#00d4ff}
  .code{font-size:14px;letter-spacing:3px;text-transform:uppercase;color:#00d4ff;font-weight:600}
  h1{font-size:clamp(28px,6vw,42px);margin:14px 0 12px;line-height:1.15;
    font-family:'Space Grotesk','Inter',sans-serif}
  p{color:#8ca0b4;font-size:16px;line-height:1.6;margin-bottom:28px}
  .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  a.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 22px;border-radius:var(--radius-sm);
    font-weight:600;font-size:15px;text-decoration:none;transition:transform .15s ease,opacity .15s ease}
  a.btn:hover{transform:translateY(-2px)}
  .primary{background:#00d4ff;color:#05060a}
  .ghost{background:rgba(255,255,255,0.06);color:#eaf6ff;border:1px solid rgba(255,255,255,0.14)}
</style>
</head>
<body>
  <main class="wrap">
    <div class="ring" aria-hidden="true"></div>
    <span class="code">Error 404</span>
    <h1>This page slipped out of the build.</h1>
    <p>The link you followed doesn't exist or has moved. Let's get you back to something that does.</p>
    <div class="btns">
      <a class="btn primary" href="index.html">Back to home</a>
      <a class="btn ghost" href="forge.html">Build a PC</a>
    </div>
  </main>
